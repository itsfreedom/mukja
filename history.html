<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>요청 내역</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260604-home-card" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <header class="page-header">
            <div>
              <h1 data-i18n="history">요청 내역</h1>
            </div>
            <button id="close-detail" class="ghost-button hidden" type="button" data-i18n="close">닫기</button>
          </header>
          <section id="history-week-view">
            <div id="week-pager" class="pager"></div>
            <section id="history-list" class="history-week-list admin-section"></section>
          </section>
          <section id="history-detail" class="hidden"></section>
          <section class="button-row admin-section">
            <button class="ghost-button" id="download-all" data-i18n="downloadAllCsv">전체 CSV 다운로드</button>
            <button class="danger-button" id="clear-all" data-i18n="clearAll">전체 삭제</button>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=20260604-home-card"></script>
    <script src="i18n.js?v=20260604-home-card"></script>
    <script src="history.js?v=20260604-home-card"></script>
  </body>
</html>
