<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>요청 목록</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260604-fake-data" />
  </head>
  <body class="order-page">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <section id="order" class="admin-section">
            <div class="panel" id="order-panel">
              <div class="list-card-header">
                <div>
                  <h2 data-i18n="requestList">요청 목록</h2>
                </div>
              </div>
              <hr class="section-divider" />
              <div class="form-grid admin-section normal-only">
                <label class="field normal-only">
                  <span data-i18n="requester">요청자</span>
                  <select id="employee-select"></select>
                </label>
                <label class="field hidden">
                  <span data-i18n="target">주문 부서</span>
                  <select id="target-filter"></select>
                </label>
              </div>
              <div id="items-list" class="item-list admin-section"></div>
              <hr class="section-divider" />
              <section class="memo-panel admin-section">
                <h3 data-i18n="memo">메모</h3>
                <div id="memo-log" class="memo-log"></div>
                <label class="field admin-section">
                  <span data-i18n="addMemo">메모 추가</span>
                  <textarea id="memo" data-i18n-placeholder="memoPlaceholder"></textarea>
                </label>
              </section>
              <div class="button-row order-action-row admin-section">
                <button class="button" id="save-create-message" data-i18n="save">저장</button>
                <button class="ghost-button" id="add-order" data-i18n="addOrder">주문 추가</button>
                <button class="danger-button" id="reset-order" data-i18n="reset">초기화</button>
              </div>
              <p class="status" id="status"></p>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=20260604-fake-data"></script>
    <script src="i18n.js?v=20260604-fake-data"></script>
    <script src="order.js?v=20260604-fake-data"></script>
  </body>
</html>
