<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>요청 하기</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260605-category-jump" />
  </head>
  <body class="order-page sidebar-collapsed">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <section id="order">
            <div class="panel" id="order-panel">
              <header class="page-header">
                <div class="page-title-stack">
                  <h1 data-i18n="requestList">요청 하기</h1>
                </div>
              </header>
              <hr class="section-divider" />
              <div class="order-mode-row admin-section hidden" id="order-mode-row">
                <button class="ghost-button" id="order-mode-order" type="button">주문 모드</button>
                <button class="ghost-button" id="order-mode-edit" type="button">수정 모드</button>
              </div>
              <div class="button-row order-action-row order-reset-row admin-section" id="order-reset-row">
                <button class="danger-button" id="reset-order" data-i18n="reset">초기화</button>
              </div>
              <div class="button-row order-action-row admin-section" id="order-save-row">
                <button class="button" id="save-create-message" data-i18n="save">저장</button>
              </div>
              <div class="recipe-item-form order-bulk-panel admin-section hidden" id="order-bulk-panel">
                <label><span>부서</span><select id="bulk-target"></select></label>
                <label><span>카테고리</span><select id="bulk-category"></select></label>
                <button class="button" id="bulk-jump" type="button">이동</button>
              </div>
              <div id="items-list" class="item-list admin-section"></div>
              <hr class="section-divider" id="order-memo-divider" />
              <section class="memo-panel admin-section" id="order-memo-panel">
                <h3 data-i18n="memo">메모</h3>
                <label class="field admin-section">
                  <textarea id="memo" data-i18n-placeholder="memoPlaceholder"></textarea>
                </label>
              </section>
              <p class="status" id="status"></p>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=20260605-category-jump"></script>
    <script src="i18n.js?v=20260605-category-jump"></script>
    <script src="order.js?v=20260605-category-jump"></script>
  </body>
</html>
