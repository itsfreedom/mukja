<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>재료 주문하기</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260604-db-schema" />
  </head>
  <body class="order-page">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <section id="order" class="split admin-section">
            <div class="panel" id="order-panel">
              <div class="list-card-header">
                <div>
                  <h2 data-i18n="createRequest">주문하기</h2>
                </div>
              </div>
              <div class="form-grid admin-section">
                <label class="field normal-only">
                  <span data-i18n="requester">요청자</span>
                  <select id="employee-select"></select>
                </label>
                <label class="field">
                  <span data-i18n="target">주문 부서</span>
                  <select id="target-filter"></select>
                </label>
              </div>
              <div id="items-list" class="item-list admin-section"></div>
              <label class="field admin-section">
                <span data-i18n="memo">메모</span>
                <textarea id="memo" data-i18n-placeholder="memoPlaceholder"></textarea>
              </label>
              <div class="button-row order-action-row admin-section">
                <button class="button" id="save-create-message" data-i18n="saveAndCreateMessage">저장 및 요청 메시지 만들기</button>
                <button class="ghost-button" id="add-order" data-i18n="addOrder">주문 추가</button>
                <button class="danger-button" id="reset-order" data-i18n="reset">초기화</button>
              </div>
            </div>

            <div class="panel">
              <h2 data-i18n="preview">요청 메시지 미리보기</h2>
              <div class="message-grid admin-section">
                <label class="field">
                  <span data-i18n="cafeteria">카페테리아</span>
                  <textarea id="cafeteria-preview" class="preview-box" readonly></textarea>
                </label>
                <label class="field">
                  <span data-i18n="vegetableGrocery">야채 / 그로서리</span>
                  <textarea id="grocery-preview" class="preview-box" readonly></textarea>
                </label>
              </div>
              <div class="button-row admin-section">
                <button class="ghost-button" id="copy-cafeteria-message" data-i18n="copyCafeteriaMessage">메시지 복사 (카페테리아)</button>
                <button class="ghost-button" id="copy-grocery-message" data-i18n="copyGroceryMessage">메시지 복사 (야채 / 그로서리)</button>
              </div>
              <p class="status" id="status"></p>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=20260604-db-schema"></script>
    <script src="i18n.js?v=20260604-db-schema"></script>
    <script src="order.js?v=20260604-db-schema"></script>
  </body>
</html>
