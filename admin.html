<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>관리자</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260605-admin-letter-icons" />
  </head>
  <body class="sidebar-collapsed">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <section id="admin-panel" class="hidden">
            <header class="page-header">
              <div class="page-title-stack">
                <h1 data-i18n="admin">관리자</h1>
              </div>
            </header>

            <section class="panel admin-section">
              <div class="section-title-row menu-category-title-row">
                <h2 data-i18n="passwordManagement">비밀번호 관리</h2>
                <button class="menu-row-action is-create" id="add-access-toggle" type="button" aria-label="사용자 추가">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
                </button>
              </div>
              <hr class="section-divider department-divider" />
              <div id="access-form-slot"></div>
              <div id="access-list" class="admin-access-list"></div>
              <p id="admin-status" class="status"></p>
            </section>

            <section class="panel admin-section">
              <div class="section-title-row menu-category-title-row">
                <h2>CSV 관리</h2>
              </div>
              <hr class="section-divider department-divider" />
              <div class="admin-csv-list">
                <article class="list-card admin-csv-row">
                  <strong>요청 목록</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="history" type="button" aria-label="요청 목록 CSV 내보내기">
                      <svg class="admin-letter-icon" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="13" /><text x="14" y="14" dominant-baseline="central" text-anchor="middle">E</text></svg>
                    </button>
                    <label class="menu-row-action" aria-label="요청 목록 CSV 가져오기">
                      <svg class="admin-letter-icon" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="13" /><text x="14" y="14" dominant-baseline="central" text-anchor="middle">I</text></svg>
                      <input class="hidden" data-import-csv="history" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
                <article class="list-card admin-csv-row">
                  <strong>메뉴</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="menus" type="button" aria-label="메뉴 CSV 내보내기">
                      <svg class="admin-letter-icon" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="13" /><text x="14" y="14" dominant-baseline="central" text-anchor="middle">E</text></svg>
                    </button>
                    <label class="menu-row-action" aria-label="메뉴 CSV 가져오기">
                      <svg class="admin-letter-icon" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="13" /><text x="14" y="14" dominant-baseline="central" text-anchor="middle">I</text></svg>
                      <input class="hidden" data-import-csv="menus" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
                <article class="list-card admin-csv-row">
                  <strong>레시피</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="recipes" type="button" aria-label="레시피 CSV 내보내기">
                      <svg class="admin-letter-icon" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="13" /><text x="14" y="14" dominant-baseline="central" text-anchor="middle">E</text></svg>
                    </button>
                    <label class="menu-row-action" aria-label="레시피 CSV 가져오기">
                      <svg class="admin-letter-icon" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="13" /><text x="14" y="14" dominant-baseline="central" text-anchor="middle">I</text></svg>
                      <input class="hidden" data-import-csv="recipes" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
              </div>
            </section>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=20260605-admin-csv-access"></script>
    <script src="i18n.js?v=20260605-item-category-dropdown"></script>
    <script src="admin.js?v=20260605-admin-letter-icons"></script>
  </body>
</html>
