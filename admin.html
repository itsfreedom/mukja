<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <script>document.documentElement.dataset.preferredLang=localStorage.getItem("restaurant_lang")||"ko";document.documentElement.lang=document.documentElement.dataset.preferredLang;</script>
    <title>관리자</title>
    <link rel="manifest" href="manifest.json?v=v161" />
    <link rel="icon" href="assets/favicon.ico?v=v161" sizes="any" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=v161" />
    <link rel="stylesheet" href="style.css?v=v161" />
  </head>
  <body class="sidebar-collapsed">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <section id="admin-panel" class="hidden">
            <header class="page-header">
              <div class="page-title-stack">
                <h1 data-i18n="admin">관리자</h1>
              </div>
            </header>

            <section class="panel admin-section">
              <div class="section-title-row menu-category-title-row">
                <h2 data-i18n="passwordManagement">비밀번호 관리</h2>
                <button class="menu-row-action is-create" id="add-access-toggle" type="button" aria-label="Add user">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
                </button>
              </div>
              <hr class="section-divider department-divider" />
              <div id="access-form-slot"></div>
              <div id="access-list" class="admin-access-list"></div>
              <p id="admin-status" class="status"></p>
            </section>

            <section class="panel admin-section">
              <div class="section-title-row menu-category-title-row">
                <h2 data-i18n="csvManagement">CSV 관리</h2>
              </div>
              <hr class="section-divider department-divider" />
              <div class="admin-csv-list">
                <article class="list-card admin-csv-row">
                  <strong data-i18n="requestHistoryCsv">요청 내역</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="history" type="button" aria-label="Export request history CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 6-4-4-4 4"/><path d="M12 2v8"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                    </button>
                    <label class="menu-row-action" aria-label="Import request history CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v8"/><path d="m16 6-4 4-4-4"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                      <input class="hidden" data-import-csv="history" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
                <article class="list-card admin-csv-row">
                  <strong data-i18n="ingredientListCsv">재료 목록</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="ingredients" type="button" aria-label="Export ingredient list CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 6-4-4-4 4"/><path d="M12 2v8"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                    </button>
                    <label class="menu-row-action" aria-label="Import ingredient list CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v8"/><path d="m16 6-4 4-4-4"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                      <input class="hidden" data-import-csv="ingredients" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
                <article class="list-card admin-csv-row">
                  <strong data-i18n="menus">메뉴</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="menus" type="button" aria-label="Export menu CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 6-4-4-4 4"/><path d="M12 2v8"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                    </button>
                    <label class="menu-row-action" aria-label="Import menu CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v8"/><path d="m16 6-4 4-4-4"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                      <input class="hidden" data-import-csv="menus" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
                <article class="list-card admin-csv-row">
                  <strong data-i18n="recipes">레시피</strong>
                  <div class="admin-csv-actions">
                    <button class="menu-row-action" data-export-csv="recipes" type="button" aria-label="Export recipe CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 6-4-4-4 4"/><path d="M12 2v8"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                    </button>
                    <label class="menu-row-action" aria-label="Import recipe CSV">
                      <svg class="admin-csv-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v8"/><path d="m16 6-4 4-4-4"/><rect width="20" height="8" x="2" y="14" rx="2"/><path d="M6 18h.01"/><path d="M10 18h.01"/></svg>
                      <input class="hidden" data-import-csv="recipes" type="file" accept=".csv,text/csv" />
                    </label>
                  </div>
                </article>
              </div>
            </section>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=v161"></script>
    <script src="i18n.js?v=v161"></script>
    <script src="admin.js?v=v161"></script>
  </body>
</html>
