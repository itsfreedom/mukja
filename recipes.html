<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <script>document.documentElement.dataset.preferredLang=localStorage.getItem("restaurant_lang")||"ko";document.documentElement.lang=document.documentElement.dataset.preferredLang;</script>
    <title>레시피</title>
    <link rel="manifest" href="manifest.json?v=v175" />
    <link rel="icon" href="assets/favicon.ico?v=v175" sizes="any" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=v175" />
    <link rel="stylesheet" href="style.css?v=v175" />
  </head>
  <body class="sidebar-collapsed">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <header class="page-header">
            <div class="page-title-stack">
              <h1 data-i18n="recipes">레시피</h1>
            </div>
            <button id="close-recipe" class="ghost-button hidden" type="button" data-i18n="close">닫기</button>
          </header>
          <div class="mode-row admin-section hidden" id="recipe-mode-row">
            <button class="ghost-button" id="recipe-mode-view" type="button" data-i18n="viewMode">보기 모드</button>
            <button class="ghost-button" id="recipe-mode-edit" type="button" data-i18n="editMode">수정 모드</button>
          </div>
          <section class="panel">
            <div class="form-grid">
              <label class="field">
                <span data-i18n="search">검색</span>
                <input id="recipe-search" data-i18n-placeholder="searchRecipes" />
              </label>
              <label class="field">
                <span data-i18n="section">섹션</span>
                <select id="recipe-section"></select>
              </label>
            </div>
          </section>
          <section id="recipe-manage-actions" class="menu-manage-actions hidden" aria-label="레시피 관리">
            <p class="delete-disabled-note" data-i18n="autoGeneratedRecipeNote">레시피는 메뉴 생성 시 자동 생성됩니다.</p>
          </section>
          <section class="split admin-section">
            <div id="recipe-list" class="list"></div>
            <div class="panel">
              <h2 data-i18n="recipeDetail">레시피 상세</h2>
              <div id="recipe-detail" class="admin-section muted"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=v175"></script>
    <script src="i18n.js?v=v175"></script>
    <script src="recipes.js?v=v175"></script>
  </body>
</html>
