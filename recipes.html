<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>레시피</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260604-semi-prep-category" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <header class="page-header">
            <div>
              <h1 data-i18n="recipes">레시피</h1>
            </div>
            <button id="close-recipe" class="ghost-button hidden" type="button" data-i18n="close">닫기</button>
          </header>
          <section class="panel">
            <div class="form-grid">
              <label class="field">
                <span data-i18n="search">검색</span>
                <input id="recipe-search" data-i18n-placeholder="searchRecipes" />
              </label>
              <label class="field">
                <span data-i18n="section">섹션</span>
                <select id="recipe-section"></select>
              </label>
            </div>
          </section>
          <section id="recipe-manage-actions" class="menu-manage-actions hidden" aria-label="레시피 관리">
            <button id="create-recipe" class="button" type="button">생성</button>
            <button id="edit-recipe" class="ghost-button" type="button">수정</button>
            <p class="delete-disabled-note">레시피는 삭제 불가</p>
          </section>
          <section class="split admin-section">
            <div id="recipe-list" class="list"></div>
            <div class="panel">
              <h2 data-i18n="recipeDetail">레시피 상세</h2>
              <div id="recipe-detail" class="admin-section muted"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <div id="recipe-edit-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="recipe-edit-title">
      <div class="recipe-modal-backdrop" data-close-recipe-edit></div>
      <article class="recipe-modal-panel menu-edit-panel">
        <header class="page-header recipe-modal-header">
          <div>
            <h1 id="recipe-edit-title">레시피 생성</h1>
            <p class="page-title-meta">레시피는 삭제 불가</p>
          </div>
          <button id="close-recipe-edit" class="icon-close-button" type="button" aria-label="닫기">×</button>
        </header>
        <div class="form-grid recipe-edit-grid">
          <input id="edit-recipe-name" data-i18n-placeholder="name" />
          <select id="edit-recipe-section"></select>
          <textarea id="edit-recipe-description" placeholder="설명"></textarea>
          <textarea id="edit-recipe-ingredients" placeholder="재료명 | 양"></textarea>
          <textarea id="edit-recipe-seasonings" placeholder="양념명 | 양"></textarea>
          <textarea id="edit-recipe-steps" placeholder="조리순서 | 사진 URL"></textarea>
          <textarea id="edit-recipe-notes" data-i18n-placeholder="notes"></textarea>
          <label class="field"><span data-i18n="activeMenu">판매중</span><input id="edit-recipe-enabled" type="checkbox" checked /></label>
        </div>
        <div class="button-row admin-section">
          <button id="save-recipe-edit" class="button" type="button" data-i18n="save">저장</button>
          <button id="cancel-recipe-edit" class="ghost-button" type="button">취소</button>
        </div>
      </article>
    </div>
    <script src="storage.js?v=20260604-semi-prep-category"></script>
    <script src="i18n.js?v=20260604-semi-prep-category"></script>
    <script src="recipes.js?v=20260604-semi-prep-category"></script>
  </body>
</html>
