<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>레시피</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260604-remote-only-fixed" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <header class="page-header">
            <div>
              <h1 data-i18n="recipes">레시피</h1>
            </div>
            <button id="close-recipe" class="ghost-button hidden" type="button" data-i18n="close">닫기</button>
          </header>
          <section class="panel">
            <div class="form-grid">
              <label class="field">
                <span data-i18n="search">검색</span>
                <input id="recipe-search" data-i18n-placeholder="searchRecipes" />
              </label>
              <label class="field">
                <span data-i18n="section">섹션</span>
                <select id="recipe-section"></select>
              </label>
            </div>
          </section>
          <section class="split admin-section">
            <div id="recipe-list" class="list"></div>
            <div class="panel">
              <h2 data-i18n="recipeDetail">레시피 상세</h2>
              <div id="recipe-detail" class="admin-section muted"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="storage.js?v=20260604-remote-only-fixed"></script>
    <script src="i18n.js?v=20260604-remote-only-fixed"></script>
    <script src="recipes.js?v=20260604-remote-only-fixed"></script>
  </body>
</html>
