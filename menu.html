<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <script>document.documentElement.dataset.preferredLang=localStorage.getItem("restaurant_lang")||"ko";document.documentElement.lang=document.documentElement.dataset.preferredLang;</script>
    <title>메뉴</title>
    <link rel="manifest" href="manifest.json?v=v192" />
    <link rel="icon" href="assets/favicon.ico?v=v192" sizes="any" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=v192" />
    <link rel="stylesheet" href="style.css?v=v192" />
  </head>
  <body class="sidebar-collapsed">
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <header class="page-header">
            <div class="page-title-stack">
              <h1 data-i18n="menus">메뉴</h1>
            </div>
          </header>
          <div class="mode-row admin-section hidden" id="menu-mode-row">
            <button class="ghost-button" id="menu-mode-view" type="button" data-i18n="viewMode">보기 모드</button>
            <button class="ghost-button" id="menu-mode-edit" type="button" data-i18n="editMode">수정 모드</button>
          </div>
          <section class="menu-filter-panel">
            <div class="menu-filter-stack">
              <label class="field menu-category-field">
                <span data-i18n="menuCategory">카테고리</span>
                <select id="menu-category"></select>
              </label>
              <label class="field menu-search-field">
                <span data-i18n="search">검색</span>
                <div class="menu-search-row">
                  <input id="menu-search" data-i18n-placeholder="searchMenus" />
                  <button id="menu-search-button" class="button compact-button menu-search-button" type="button" aria-label="검색">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6" /><path d="m16 16 4 4" /></svg>
                  </button>
                </div>
              </label>
            </div>
          </section>
          <section class="admin-section">
            <div class="menu-results-card">
              <div id="menu-list" class="list"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <div id="menu-recipe-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="menu-recipe-title">
      <div class="recipe-modal-backdrop" data-close-recipe-modal></div>
      <article class="recipe-modal-panel">
        <header class="page-header recipe-modal-header">
          <div class="page-title-stack">
            <h1 id="menu-recipe-title" data-i18n="menuDetail">메뉴 레시피</h1>
          </div>
          <button id="close-menu-recipe" class="icon-close-button" type="button" aria-label="닫기"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12" /><path d="M18 6 6 18" /></svg></button>
        </header>
        <div class="mode-row admin-section hidden" id="menu-recipe-mode-row">
          <button class="ghost-button" id="menu-recipe-mode-view" type="button" data-i18n="viewMode">보기 모드</button>
          <button class="ghost-button" id="menu-recipe-mode-edit" type="button" data-i18n="editMode">수정 모드</button>
        </div>
        <div id="menu-recipe-content" class="history-detail-content"></div>
        <section id="menu-recipe-actions" class="menu-recipe-actions hidden" aria-label="레시피 관리">
          <button id="edit-recipe-from-menu" class="ghost-button recipe-action-button" type="button" data-i18n="close">닫기</button>
          <button id="delete-recipe-from-menu" class="danger-button recipe-action-button" type="button" data-i18n="delete">삭제</button>
        </section>
      </article>
    </div>
    <div id="menu-recipe-edit-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="menu-recipe-edit-title">
      <div class="recipe-modal-backdrop" data-close-menu-recipe-edit></div>
      <article class="recipe-modal-panel menu-edit-panel">
        <header class="page-header recipe-modal-header">
          <div class="page-title-stack">
            <h1 id="menu-recipe-edit-title" data-i18n="editRecipe">레시피 수정</h1>
          </div>
          <button id="close-menu-recipe-edit" class="icon-close-button" type="button" aria-label="닫기"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12" /><path d="M18 6 6 18" /></svg></button>
        </header>
        <div class="form-grid recipe-edit-grid">
          <input id="menu-edit-recipe-name" data-i18n-placeholder="name" />
          <select id="menu-edit-recipe-section" class="hidden"></select>
          <textarea id="menu-edit-recipe-description" data-i18n-placeholder="description" placeholder="설명"></textarea>
          <textarea id="menu-edit-recipe-ingredients" data-i18n-placeholder="ingredients" placeholder="재료명 | 양"></textarea>
          <textarea id="menu-edit-recipe-steps" data-i18n-placeholder="steps" placeholder="조리순서 | 사진 URL"></textarea>
          <textarea id="menu-edit-recipe-notes" data-i18n-placeholder="notes"></textarea>
        </div>
        <div class="button-row admin-section">
          <button id="save-menu-recipe-edit" class="button" type="button" data-i18n="save">저장</button>
          <button id="delete-menu-recipe-edit" class="danger-button" type="button" data-i18n="delete">삭제</button>
          <button id="cancel-menu-recipe-edit" class="ghost-button" type="button" data-i18n="close">취소</button>
        </div>
      </article>
    </div>
    <div id="menu-edit-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="menu-edit-title">
      <div class="recipe-modal-backdrop" data-close-menu-edit></div>
      <article class="recipe-modal-panel menu-edit-panel">
        <header class="page-header recipe-modal-header">
          <div class="page-title-stack">
            <h1 id="menu-edit-title" data-i18n="addMenu">메뉴 추가</h1>
          </div>
          <button id="close-menu-edit" class="icon-close-button" type="button" aria-label="닫기"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12" /><path d="M18 6 6 18" /></svg></button>
        </header>
        <div class="form-grid menu-form-grid">
          <label class="menu-form-field">
            <span data-i18n="koreanMenuName">한글 메뉴명</span>
            <input id="edit-menu-name-ko" data-i18n-placeholder="name" />
          </label>
          <label class="menu-form-field">
            <span data-i18n="englishMenuName">영문 메뉴명</span>
            <input id="edit-menu-name-en" data-i18n-placeholder="englishName" />
          </label>
          <label class="menu-form-field">
            <span data-i18n="menuCategory">카테고리</span>
            <select id="edit-menu-category"></select>
          </label>
          <label class="menu-form-field">
            <span><span data-i18n="price">가격</span> (CAD)</span>
            <input id="edit-menu-price" data-i18n-placeholder="price" inputmode="decimal" />
          </label>
          <select id="edit-menu-recipe" class="hidden"></select>
          <div class="menu-option-row">
            <div class="menu-option-card menu-status-card">
              <label class="menu-check-option">
                <input id="edit-menu-active" name="edit-menu-status" type="radio" value="active" checked />
                <span data-i18n="activeSale">판매</span>
              </label>
              <label class="menu-check-option">
                <input id="edit-menu-discontinued" name="edit-menu-status" type="radio" value="discontinued" />
                <span data-i18n="inactiveSale">판매 중지</span>
              </label>
            </div>
            <label class="menu-option-card menu-check-option">
              <input id="edit-menu-seasonal" type="checkbox" />
              <span data-i18n="seasonalMenu">계절 메뉴</span>
            </label>
          </div>
        </div>
        <div class="button-row admin-section">
          <button id="save-menu-edit" class="button" type="button" data-i18n="save">저장</button>
          <button id="delete-menu-edit" class="danger-button hidden" type="button" data-i18n="delete">삭제</button>
          <button id="cancel-menu-edit" class="ghost-button" type="button" data-i18n="close">취소</button>
        </div>
      </article>
    </div>
    <script src="storage.js?v=v192"></script>
    <script src="i18n.js?v=v192"></script>
    <script src="menu.js?v=v192"></script>
  </body>
</html>
