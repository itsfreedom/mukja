<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a15" />
    <meta name="format-detection" content="telephone=no" />
    <title>메뉴</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=20260604-readonly-recipe-status" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" data-layout-sidebar></aside>
      <main class="main-frame">
        <div class="main-surface">
          <header class="page-header">
            <div>
              <h1 data-i18n="menus">메뉴</h1>
            </div>
          </header>
          <section class="menu-filter-panel">
            <div class="menu-filter-stack">
              <label class="field menu-category-field">
                <span data-i18n="menuCategory">카테고리</span>
                <select id="menu-category"></select>
              </label>
              <label class="field menu-search-field">
                <span data-i18n="search">검색</span>
                <div class="menu-search-row">
                  <input id="menu-search" data-i18n-placeholder="searchMenus" />
                  <button id="menu-search-button" class="button compact-button" type="button" data-i18n="search">검색</button>
                </div>
              </label>
            </div>
          </section>
          <section id="menu-manage-actions" class="menu-manage-actions hidden" aria-label="메뉴 관리">
            <button id="create-menu" class="button" type="button">생성</button>
            <button id="edit-menu" class="ghost-button" type="button">수정</button>
            <button id="delete-menu" class="danger-button" type="button">판매 중지</button>
          </section>
          <section class="admin-section">
            <div class="menu-results-card">
              <div id="menu-list" class="list"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <div id="menu-recipe-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="menu-recipe-title">
      <div class="recipe-modal-backdrop" data-close-recipe-modal></div>
      <article class="recipe-modal-panel">
        <header class="page-header recipe-modal-header">
          <div>
            <h1 id="menu-recipe-title" data-i18n="menuDetail">메뉴 레시피</h1>
          </div>
          <span id="menu-recipe-status" class="badge green"></span>
          <button id="close-menu-recipe" class="icon-close-button" type="button" aria-label="닫기">×</button>
        </header>
        <section id="menu-recipe-actions" class="menu-recipe-actions hidden" aria-label="레시피 관리">
          <button id="edit-recipe-from-menu" class="danger-button recipe-save-button" type="button">레시피 수정</button>
          <p class="delete-disabled-note">레시피는 삭제 불가</p>
        </section>
        <div id="menu-recipe-content" class="history-detail-content"></div>
      </article>
    </div>
    <div id="menu-recipe-edit-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="menu-recipe-edit-title">
      <div class="recipe-modal-backdrop" data-close-menu-recipe-edit></div>
      <article class="recipe-modal-panel menu-edit-panel">
        <header class="page-header recipe-modal-header">
          <div>
            <h1 id="menu-recipe-edit-title">레시피 수정</h1>
          </div>
          <button id="close-menu-recipe-edit" class="icon-close-button" type="button" aria-label="닫기">×</button>
        </header>
        <div class="form-grid recipe-edit-grid">
          <input id="menu-edit-recipe-name" data-i18n-placeholder="name" />
          <select id="menu-edit-recipe-section" class="hidden"></select>
          <textarea id="menu-edit-recipe-description" placeholder="설명"></textarea>
          <textarea id="menu-edit-recipe-ingredients" placeholder="재료명 | 양"></textarea>
          <textarea id="menu-edit-recipe-seasonings" placeholder="양념명 | 양"></textarea>
          <textarea id="menu-edit-recipe-steps" placeholder="조리순서 | 사진 URL"></textarea>
          <textarea id="menu-edit-recipe-notes" data-i18n-placeholder="notes"></textarea>
        </div>
        <div class="button-row admin-section">
          <button id="save-menu-recipe-edit" class="button" type="button" data-i18n="save">저장</button>
          <button id="cancel-menu-recipe-edit" class="ghost-button" type="button">취소</button>
        </div>
      </article>
    </div>
    <div id="menu-edit-modal" class="recipe-modal hidden" role="dialog" aria-modal="true" aria-labelledby="menu-edit-title">
      <div class="recipe-modal-backdrop" data-close-menu-edit></div>
      <article class="recipe-modal-panel menu-edit-panel">
        <header class="page-header recipe-modal-header">
          <div>
            <h1 id="menu-edit-title">메뉴 생성</h1>
          </div>
          <button id="close-menu-edit" class="icon-close-button" type="button" aria-label="닫기">×</button>
        </header>
        <div class="form-grid">
          <input id="edit-menu-name-ko" data-i18n-placeholder="name" />
          <input id="edit-menu-name-en" data-i18n-placeholder="englishName" />
          <input id="edit-menu-category" data-i18n-placeholder="menuCategory" />
          <input id="edit-menu-price" data-i18n-placeholder="price" inputmode="decimal" />
          <select id="edit-menu-recipe" class="hidden"></select>
          <label class="field"><span data-i18n="seasonalMenu">계절 메뉴</span><input id="edit-menu-seasonal" type="checkbox" /></label>
          <label class="field"><span data-i18n="activeMenu">판매중</span><input id="edit-menu-active" type="checkbox" checked /></label>
        </div>
        <div class="button-row admin-section">
          <button id="save-menu-edit" class="button" type="button" data-i18n="save">저장</button>
          <button id="cancel-menu-edit" class="ghost-button" type="button">취소</button>
        </div>
      </article>
    </div>
    <script src="storage.js?v=20260604-readonly-recipe-status"></script>
    <script src="i18n.js?v=20260604-readonly-recipe-status"></script>
    <script src="menu.js?v=20260604-readonly-recipe-status"></script>
  </body>
</html>
